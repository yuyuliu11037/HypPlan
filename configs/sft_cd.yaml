model:
  base_model: "meta-llama/Llama-3.1-8B-Instruct"
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

data:
  train_data: "data/cd_train_sft.jsonl"
  test_data: "data/cd_test_sft.jsonl"
  max_seq_len: 384

training:
  lr: 2.0e-4
  epochs: 5
  batch_size: 8
  grad_accum: 1
  warmup_ratio: 0.05
  output_dir: "checkpoints/sft_cd"
  log_dir: "logs"

eval:
  max_new_tokens: 384
  temperature: 0.0
  output_dir: "results/cd_sft"
