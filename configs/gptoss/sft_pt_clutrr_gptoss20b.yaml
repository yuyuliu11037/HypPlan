model:
  base_model: openai/gpt-oss-20b
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
data:
  train_data: data/clutrr_train_sft_plan.jsonl
  max_seq_len: 512
training:
  lr: 0.0001
  epochs: 5
  batch_size: 4
  grad_accum: 4
  warmup_ratio: 0.05
  weight_decay: 0.0
  grad_clip: 1.0
  output_dir: checkpoints/sft_pt_clutrr_gptoss20b
