data:
  train_data: data/rulechain_train.jsonl
  test_data: data/rulechain_test.jsonl
  train_limit: 2000
model:
  base_model: Qwen/Qwen2.5-14B-Instruct
  head_checkpoint: checkpoints/head_rulechain_qwen14b_rank/head.pt
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  up_proj_hidden: 2048
training:
  epochs: 2
  grad_clip: 1.0
  lr: 1.0e-4
  rollout_max_new_tokens: 512
  rollout_temperature: 0.7
  rollout_top_p: 0.95
  rollouts_per_problem: 3
  max_steps_per_problem: 8
  output_dir: checkpoints/dagger_stage2_rulechain_indomain
  seed: 1234
  weight_decay: 0.0
