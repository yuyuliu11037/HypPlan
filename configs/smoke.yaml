seed: 7
output_dir: outputs/smoke

distributed:
  mixed_precision: "no"

model:
  name: Qwen/Qwen2.5-7B
  dtype: bfloat16
  attn_implementation: sdpa
  trust_remote_code: false
  gradient_checkpointing: true
  planning_head_mlp_ratio: 2
  planning_head_dropout: 0.0
  use_lora: true
  use_lora_for_baseline: true
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj

data:
  dataset_name: whyNLP/gsm8k-aug
  train_split: train
  validation_size: 32
  seed: 7
  max_length: 512
  add_eos_token: true
  num_workers: 0

training:
  batch_size: 1
  eval_batch_size: 1
  stage1:
    max_steps: 2
    resume_from: null
    learning_rate: 5.0e-4
    warmup_steps: 0
    grad_accum_steps: 1
    max_grad_norm: 1.0
    log_every: 1
    eval_every: 1
    eval_loss_batches: 1
    eval_generation_examples: 0
    save_every: 1
  stage2:
    max_steps: 2
    resume_from: null
    learning_rate: 2.0e-4
    warmup_steps: 0
    grad_accum_steps: 1
    max_grad_norm: 1.0
    log_every: 1
    eval_every: 1
    eval_loss_batches: 1
    eval_generation_examples: 1
    save_every: 1
  baseline:
    max_steps: 2
    resume_from: null
    learning_rate: 2.0e-4
    warmup_steps: 0
    grad_accum_steps: 1
    max_grad_norm: 1.0
    log_every: 1
    eval_every: 1
    eval_loss_batches: 1
    eval_generation_examples: 1
    save_every: 1

generation:
  temperature: 0.0
  max_step_tokens: 16
  max_answer_tokens: 16
  max_new_tokens: 64
  eval_examples: 1
