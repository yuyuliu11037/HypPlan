model:
  base_model: "checkpoints/sft_24_tot_merged"
  head_checkpoint: "checkpoints/head_poincare_distortion/head.pt"
  manifold: "poincare"
  hyp_dim: 32
  up_proj_hidden: 2048
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

data:
  train_data: "data/24_train_plan5k_tot.jsonl"
  test_data: "data/24_test_tot.jsonl"
  max_seq_len: 256

training:
  lr: 1.0e-4
  epochs: 3
  batch_size: 1
  grad_accum: 4
  warmup_ratio: 0.05
  output_dir: "checkpoints/hyp_stage2_poincare_distortion"
  log_dir: "logs"

eval:
  max_new_tokens: 256
  temperature: 0.0
  max_z_injections: 3
  output_dir: "results/hyp_stage2_poincare_distortion"
