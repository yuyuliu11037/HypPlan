model:
  base_model: mistralai/Mistral-Small-3.2-24B-Instruct-2506
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_4bit: 1
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
data:
  train_data: data/24_train_sft_pt.jsonl
  max_seq_len: 384
training:
  lr: 0.0001
  epochs: 5
  batch_size: 2
  grad_accum: 8
  warmup_ratio: 0.05
  weight_decay: 0.0
  grad_clip: 1.0
  output_dir: checkpoints/sft_pt_24_mistral24b
