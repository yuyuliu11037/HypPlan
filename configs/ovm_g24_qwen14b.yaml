model:
  base_model: "Qwen/Qwen2.5-14B-Instruct"
  lora_adapter: "checkpoints/sft_pt_24_qwen14b/lora"
data:
  rollouts:
    - "data/ovm/rollouts_g24_shard0.jsonl"
    - "data/ovm/rollouts_g24_shard1.jsonl"
  max_seq_len: 512
training:
  lr: 1.0e-4
  epochs: 2
  batch_size: 4
  grad_accum: 4
  warmup_ratio: 0.05
  weight_decay: 0.0
  grad_clip: 1.0
  pos_weight: 15.0   # 1/p_correct=1/0.06 to balance ~94% negatives
  output_dir: "checkpoints/ovm_g24_qwen14b"
