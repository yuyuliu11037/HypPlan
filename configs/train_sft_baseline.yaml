seed: 42
output_dir: outputs/sft

distributed:
  mixed_precision: "no"

model:
  name: Qwen/Qwen2.5-7B
  dtype: bfloat16
  attn_implementation: sdpa
  trust_remote_code: false
  gradient_checkpointing: true
  planning_head_mlp_ratio: 4
  planning_head_dropout: 0.0
  use_lora_for_baseline: true
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - up_proj
      - down_proj
      - gate_proj

data:
  dataset_name: whyNLP/gsm8k-aug
  train_split: train
  validation_size: 4096
  seed: 42
  max_length: 1024
  add_eos_token: true
  num_workers: 2

training:
  batch_size: 1
  eval_batch_size: 1
  baseline:
    max_steps: 3000
    resume_from: null
    learning_rate: 2.0e-4
    weight_decay: 0.0
    warmup_steps: 100
    grad_accum_steps: 8
    max_grad_norm: 1.0
    log_every: 10
    eval_every: 100
    eval_loss_batches: 16
    eval_generation_examples: 32
    save_every: 100

generation:
  temperature: 0.0
  max_new_tokens: 160
  eval_examples: 32
