data:
  test_data: data/rulechain_test.jsonl
  train_data: data/rulechain_train.jsonl
  train_limit: 6000
eval:
  max_new_tokens: 384
  max_z_injections: 4
  output_dir: results/dagger_stage2_rulechain_bal_r4
  temperature: 0.0
model:
  base_model: Qwen/Qwen2.5-14B-Instruct
  head_checkpoint: checkpoints/head_rulechain_qwen14b_rank/head.pt
  lora_alpha: 8
  lora_dropout: 0.05
  lora_r: 4
  up_proj_hidden: 2048
training:
  epochs: 2
  grad_clip: 0.3
  lr: 5.0e-5
  max_steps: 4
  output_dir: checkpoints/dagger_stage2_rulechain_bal_r4
  rollout_max_new_tokens: 384
  rollout_temperature: 0.3
  rollout_top_p: 0.9
  rollouts_per_problem: 1
  seed: 1234
  weight_decay: 0.0
