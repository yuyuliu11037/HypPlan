data:
  pairs_per_tree: 2048
  test_split: test
  train_split: train
  tree_dir: data/trees
  val_split: val
eval:
  eval_pairs_per_tree: 4096
  output_dir: results/head_eval/lorentz_distortion
  vis_hyp_dim: 2
  vis_problems:
  - 0
  - 5
  - 42
model:
  base_model: checkpoints/sft_24_tot_merged
  head_hidden_dims:
  - 1024
  - 256
  hyp_dim: 32
  manifold: lorentz
training:
  epochs: 20
  log_dir: logs
  loss: distortion
  lr: 0.001
  output_dir: checkpoints/head_lorentz_distortion
  ranking_negatives: 10
  trees_per_batch: 4
  warmup_ratio: 0.05
  weight_decay: 0.0001
