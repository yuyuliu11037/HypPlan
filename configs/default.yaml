model:
  base_model: "Qwen/Qwen2.5-7B"
  proj_hidden_dims: [2048]
  plan_token: "[PLAN]"

data:
  dataset: "EleutherAI/hendrycks_math"
  configs: ["algebra", "counting_and_probability", "geometry",
            "intermediate_algebra", "number_theory", "prealgebra", "precalculus"]
  max_seq_len: 2048
  eval_samples: 500

stage1:
  lr: 1.0e-4
  epochs: 3
  batch_size: 1
  grad_accum: 16
  warmup_ratio: 0.05
  output_dir: "checkpoints/stage1"

eval:
  max_new_tokens: 2048
  temperature: 0.0
  output_dir: "results/eval"
