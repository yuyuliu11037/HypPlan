seed: 42
model_name_or_path: "Qwen/Qwen2.5-7B"
dataset_name: "whynlp/gsm8k-aug"
train_split: "train"
eval_split: "validation"
output_dir: "outputs/em-qwen2.5-7b"

# EM settings
num_em_iterations: 2
train_epochs_per_em: 1
max_train_samples: null
# Optional ratio-based sampling on top of max_train_samples; set <1.0 to train on a subset.
train_subset_ratio: 0.05
train_subset_seed: 42
max_steps_per_epoch: null
plan_loss_weight: 1.0
reason_loss_weight: 1.0

# Sequence settings
max_question_tokens: 512
max_step_tokens: 128

# Planning latent settings
# planning_dim is derived from model hidden_size (kept optional only for backward compatibility)
planning_mlp_hidden_dim: 1024

# Optimization
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03
gradient_accumulation_steps: 4
max_grad_norm: 1.0
per_device_batch_size: 4

# Mixed precision: "no", "fp16", "bf16"
mixed_precision: "bf16"

# LoRA / PEFT
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Runtime helpers
# For 4-GPU training, launch with:
#   accelerate launch --num_processes 4 --multi_gpu scripts/train_em.py --config configs/train.yaml
save_every_steps: 100
log_every_steps: 10

# Optional subset controls (used by EM and SFT baseline trainer)
train_subset_ratio: 1.0
train_subset_seed: 42
